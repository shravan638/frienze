```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frienze AI</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0f0f18;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#141421;
border-right:1px solid #222;
display:flex;
flex-direction:column;
}

.sidebar-header{
padding:18px;
font-size:18px;
font-weight:bold;
color:#c8a96e;
border-bottom:1px solid #222;
}

.new-chat{
margin:15px;
padding:10px;
background:#1f1f2e;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.history{
flex:1;
overflow-y:auto;
padding:10px;
}

.history-item{
padding:10px;
border-radius:6px;
cursor:pointer;
margin-bottom:6px;
background:#1a1a28;
font-size:14px;
}

.history-item:hover{
background:#26263a;
}

/* MAIN AREA */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:16px;
border-bottom:1px solid #222;
font-size:18px;
}

.chat{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
max-width:65%;
padding:12px 16px;
border-radius:12px;
font-size:14px;
line-height:1.4;
}

.user{
background:#1f1f2e;
align-self:flex-end;
}

.ai{
background:#2a2a3d;
border:1px solid rgba(200,169,110,0.2);
align-self:flex-start;
}

/* INPUT */

.input-area{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid #222;
}

#textInput{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #333;
background:#1a1a26;
color:white;
}

button{
background:#1f1f2e;
border:none;
padding:10px 14px;
border-radius:8px;
color:white;
cursor:pointer;
}

button:hover{
background:#2a2a3d;
}

.status{
font-size:12px;
color:#aaa;
padding-left:15px;
padding-bottom:10px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="sidebar-header">
Frienze AI
</div>

<button class="new-chat" onclick="newChat()">
+ New Chat
</button>

<div class="history" id="historyList"></div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">
Your AI Companion
</div>

<div class="chat" id="chat"></div>

<div class="input-area">

<button onclick="toggleVoice()">🎤</button>

<input
id="textInput"
placeholder="Message Frienze..."
onkeydown="if(event.key==='Enter') sendText()"
/>

<button onclick="sendText()">Send</button>

</div>

<div class="status" id="status">
Ready
</div>

</div>

<script>

let recognition
let listening=false

let chats=JSON.parse(localStorage.getItem("frienzeChats")||"[]")
let currentChat=[]

const chatBox=document.getElementById("chat")

function saveChats(){
localStorage.setItem("frienzeChats",JSON.stringify(chats))
}

function newChat(){

if(currentChat.length>0){
chats.push(currentChat)
saveChats()
}

currentChat=[]
chatBox.innerHTML=""
renderHistory()

}

function renderHistory(){

const history=document.getElementById("historyList")

history.innerHTML=""

chats.forEach((chat,index)=>{

const item=document.createElement("div")

item.className="history-item"

item.textContent=chat[0]?.text.slice(0,30) || "Conversation"

item.onclick=()=>loadChat(index)

history.appendChild(item)

})

}

function loadChat(i){

currentChat=chats[i]

chatBox.innerHTML=""

currentChat.forEach(m=>addMessage(m.text,m.type,false))

}

function addMessage(text,type,save=true){

const msg=document.createElement("div")

msg.className="message "+type

msg.textContent=text

chatBox.appendChild(msg)

chatBox.scrollTop=chatBox.scrollHeight

if(save){
currentChat.push({text,type})
}

}

function sendText(){

const input=document.getElementById("textInput")

const text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

reply(text)

}

function reply(userText){

document.getElementById("status").textContent="Frienze thinking..."

setTimeout(()=>{

let response="You said: "+userText

addMessage(response,"ai")

speak(response)

document.getElementById("status").textContent="Ready"

},800)

}

function speak(text){

const speech=new SpeechSynthesisUtterance(text)

speech.lang="en-US"

speech.rate=1

speechSynthesis.speak(speech)

}

function toggleVoice(){

if(!('webkitSpeechRecognition' in window)){
alert("Voice not supported")
return
}

if(!recognition){

recognition=new webkitSpeechRecognition()

recognition.lang="en-US"

recognition.onstart=()=>{
listening=true
document.getElementById("status").textContent="Listening..."
}

recognition.onend=()=>{
listening=false
document.getElementById("status").textContent="Ready"
}

recognition.onresult=(e)=>{

const text=e.results[0][0].transcript

addMessage(text,"user")

reply(text)

}

}

if(!listening){
recognition.start()
}else{
recognition.stop()
}

}

renderHistory()

</script>

</body>
</html>
