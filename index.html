```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frienze AI</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0e0e16;
color:white;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
margin:0;
}

header{
font-size:24px;
margin:20px;
font-weight:bold;
color:#c8a96e;
}

.chat-container{
width:90%;
max-width:700px;
height:420px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
padding:20px;
background:#141420;
border-radius:12px;
border:1px solid rgba(200,169,110,0.2);
}

.message{
padding:12px 16px;
border-radius:12px;
max-width:70%;
font-size:15px;
line-height:1.4;
}

.user{
background:#1f1f2e;
align-self:flex-end;
}

.ai{
background:#2a2a3d;
align-self:flex-start;
border:1px solid rgba(200,169,110,0.2);
}

.input-area{
width:90%;
max-width:700px;
display:flex;
gap:10px;
margin-top:15px;
}

#textInput{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #333;
background:#1a1a26;
color:white;
font-size:15px;
}

button{
background:#1f1f2e;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2a2a3d;
}

.status{
margin-top:10px;
font-size:13px;
color:#aaa;
}

</style>
</head>

<body>

<header>Frienze AI</header>

<div class="chat-container" id="chatContainer"></div>

<div class="input-area">

<button onclick="toggleVoice()">🎤</button>

<input
id="textInput"
type="text"
placeholder="Type a message to Frienze..."
onkeydown="if(event.key==='Enter') sendText()"
/>

<button onclick="sendText()">Send</button>

</div>

<div class="status" id="statusMsg">
Frienze is ready.
</div>

<script>

let recognition
let listening=false

function setStatus(text){
document.getElementById("statusMsg").textContent=text
}

function addMessage(text,type){

const chat=document.getElementById("chatContainer")

const msg=document.createElement("div")

msg.className="message "+type

msg.textContent=text

chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight

}

function sendText(){

const input=document.getElementById("textInput")

const message=input.value.trim()

if(!message) return

addMessage(message,"user")

input.value=""

setStatus("Frienze is thinking...")

setTimeout(()=>{

addMessage("Hi! I'm Frienze. Full AI replies will connect soon.","ai")

setStatus("Frienze is ready")

},1000)

}

function toggleVoice(){

if(!('webkitSpeechRecognition' in window)){
alert("Speech recognition not supported in this browser")
return
}

if(!recognition){

recognition=new webkitSpeechRecognition()

recognition.continuous=false
recognition.interimResults=false
recognition.lang="en-US"

recognition.onstart=function(){
listening=true
setStatus("Listening...")
}

recognition.onend=function(){
listening=false
setStatus("Frienze is ready")
}

recognition.onerror=function(e){
setStatus("Voice error: "+e.error)
}

recognition.onresult=function(event){

const text=event.results[0][0].transcript

addMessage(text,"user")

setStatus("Frienze thinking...")

setTimeout(()=>{

addMessage("I heard: "+text,"ai")

setStatus("Frienze is ready")

},1000)

}

}

if(!listening){
recognition.start()
}else{
recognition.stop()
}

}

</script>

</body>
</html>
